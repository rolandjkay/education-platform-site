backend:
  name: git-gateway
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

# Slug format: lowercase, hyphens
slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: articles
    label: Articles
    label_singular: Article
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime, default: "" }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false, hint: "Comma-separated tags e.g. physics, optics" }
      - { label: Body, name: body, widget: markdown }

  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime, default: "" }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: apps
    label: Apps
    label_singular: App
    folder: src/content/apps
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - label: App Type
        name: appType
        widget: select
        options:
          - { label: Three.js (3D/WebGL), value: threejs }
          - { label: Canvas 2D, value: canvas }
          - { label: Other, value: other }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
