<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Definitions -->
  <defs>
    <!-- Deep space gradient -->
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b0f2a"/>
      <stop offset="50%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Nebula glow -->
    <radialGradient id="nebula1">
      <stop offset="0%" stop-color="#5f6aff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebula2">
      <stop offset="0%" stop-color="#ff6ad5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Star glow -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pi glow -->
    <filter id="piGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#spaceGradient)"/>

  <!-- Nebula clouds -->
  <circle cx="180" cy="200" r="150" fill="url(#nebula1)"/>
  <circle cx="320" cy="300" r="180" fill="url(#nebula2)"/>

  <!-- Stars -->
  <g fill="white" filter="url(#starGlow)">
    <circle cx="50" cy="80" r="1.2"/>
    <circle cx="120" cy="200" r="1.5"/>
    <circle cx="300" cy="100" r="1"/>
    <circle cx="400" cy="250" r="1.3"/>
    <circle cx="200" cy="400" r="1"/>
    <circle cx="350" cy="420" r="1.6"/>
    <circle cx="80" cy="300" r="1.2"/>
    <circle cx="450" cy="50" r="1"/>
    <circle cx="250" cy="50" r="1.4"/>
    <circle cx="30" cy="450" r="1"/>
    <circle cx="420" cy="120" r="1.3"/>
    <circle cx="100" cy="350" r="1.5"/>
    <circle cx="380" cy="380" r="1.2"/>

    <!-- Twinkling stars -->
    <circle cx="220" cy="150" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="330" cy="200" r="1.2">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Pi symbol -->
  <text x="250" y="320"
        font-size="260"
        text-anchor="middle"
        fill="white"
        font-family="Times New Roman, serif"
        filter="url(#piGlow)">
    π
  </text>

</svg>